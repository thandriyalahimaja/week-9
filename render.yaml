services:
  - type: web
    name: blog-platform-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: DB_URL
        value: "mongodb+srv://<username>:<password>@<cluster-url>/<database>?retryWrites=true&w=majority"
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGINS
        sync: false

  - type: web
    name: blog-platform-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_BASE_URL
        sync: false
